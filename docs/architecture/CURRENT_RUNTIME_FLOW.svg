<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1420" role="img" aria-labelledby="title desc">
  <title id="title">EpochEye current runtime flow</title>
  <desc id="desc">Visual map of the current EpochEye app runtime, including entry point, provider stack, onboarding flow, main navigation, and key service relationships.</desc>
  <defs>
    <style>
      .bg { fill: #05070c; }
      .section { fill: #0b1220; stroke: #1f2a44; stroke-width: 2; rx: 24; }
      .section-title { fill: #f8fafc; font: 700 28px Arial, sans-serif; }
      .section-sub { fill: #94a3b8; font: 400 15px Arial, sans-serif; }
      .node { fill: #111827; stroke: #60a5fa; stroke-width: 2.5; rx: 18; }
      .node-amber { fill: #1d1408; stroke: #f59e0b; stroke-width: 2.5; rx: 18; }
      .node-green { fill: #071a15; stroke: #10b981; stroke-width: 2.5; rx: 18; }
      .node-dormant { fill: #151821; stroke: #64748b; stroke-width: 2; stroke-dasharray: 10 8; rx: 18; }
      .gate { fill: #14111f; stroke: #c084fc; stroke-width: 2.5; rx: 18; }
      .note { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 20; }
      .mini { fill: #0f172a; stroke: #334155; stroke-width: 1.5; rx: 14; }
      .title { fill: #ffffff; font: 700 38px Arial, sans-serif; }
      .subtitle { fill: #a5b4c7; font: 400 18px Arial, sans-serif; }
      .label { fill: #e5eefc; font: 700 18px Arial, sans-serif; }
      .sub { fill: #9fb0c8; font: 400 13px Arial, sans-serif; }
      .small { fill: #a8b4c7; font: 400 12px Arial, sans-serif; }
      .muted { fill: #7f8ea6; font: 400 12px Arial, sans-serif; }
      .legend { fill: #dbe7f5; font: 600 14px Arial, sans-serif; }
      .line { stroke: #6ea8ff; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .line-amber { stroke: #f59e0b; stroke-width: 3; fill: none; marker-end: url(#arrowAmber); }
      .line-green { stroke: #10b981; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .line-dormant { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrowMuted); }
      .line-muted { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrowMuted); }
      .chip { fill: #182235; stroke: #2d4265; stroke-width: 1; rx: 999; }
      .chip-text { fill: #cfe1ff; font: 600 12px Arial, sans-serif; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ea8ff" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981" />
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2000" height="1420" />

  <text x="60" y="58" class="title">EpochEye Current Runtime Flow</text>
  <text x="60" y="90" class="subtitle">Actual visual map derived from the live repo on March 17, 2026.</text>

  <rect class="chip" x="1460" y="38" width="120" height="28" />
  <text x="1520" y="57" text-anchor="middle" class="chip-text">active path</text>
  <rect class="chip" x="1600" y="38" width="120" height="28" style="fill:#1f1408;stroke:#7c5b1a;" />
  <text x="1660" y="57" text-anchor="middle" class="chip-text">onboarding</text>
  <rect class="chip" x="1740" y="38" width="170" height="28" style="fill:#151821;stroke:#64748b;stroke-dasharray:10 8;" />
  <text x="1825" y="57" text-anchor="middle" class="chip-text">present but dormant</text>

  <rect class="section" x="40" y="120" width="1920" height="250" />
  <text x="70" y="160" class="section-title">1. Boot And Gating</text>
  <text x="70" y="184" class="section-sub">Entry point, provider stack, offline branch, and onboarding/auth decision.</text>

  <rect class="node" x="80" y="220" width="150" height="76" />
  <text x="155" y="252" text-anchor="middle" class="label">index.js</text>
  <text x="155" y="273" text-anchor="middle" class="sub">AppRegistry</text>

  <rect class="node" x="270" y="220" width="150" height="76" />
  <text x="345" y="252" text-anchor="middle" class="label">App.tsx</text>
  <text x="345" y="273" text-anchor="middle" class="sub">root component</text>

  <rect class="node" x="460" y="220" width="170" height="76" />
  <text x="545" y="252" text-anchor="middle" class="label">SafeAreaProvider</text>
  <text x="545" y="273" text-anchor="middle" class="sub">react-native-safe-area-context</text>

  <rect class="node" x="670" y="205" width="230" height="106" />
  <text x="785" y="236" text-anchor="middle" class="label">Provider Stack</text>
  <text x="785" y="258" text-anchor="middle" class="sub">NetworkProvider</text>
  <text x="785" y="278" text-anchor="middle" class="sub">UserProvider</text>
  <text x="785" y="298" text-anchor="middle" class="sub">PlacesProvider</text>


  <text x="1240" y="273" text-anchor="middle" class="sub">src/navigation/index.tsx</text>

  <rect class="gate" x="1370" y="205" width="250" height="106" />
  <text x="1495" y="236" text-anchor="middle" class="label">Gate</text>
  <text x="1495" y="258" text-anchor="middle" class="sub">onboarding_complete?</text>
  <text x="1495" y="278" text-anchor="middle" class="sub">isAuthenticated()?</text>
  <text x="1495" y="298" text-anchor="middle" class="small">also restores saved nav state</text>

